<!-- FRAGMENTO A AGREGAR AL index.html - REEMPLAZAR SECCIÓN DE PARTIDO RÁPIDO -->

<!-- SECCIÓN: PARTIDO INTERACTIVO 2D -->
<section id="partido-interactivo" class="partido-section">
  <h2>Partido en Vivo</h2>
  
  <!-- CONTROLES DEL PARTIDO -->
  <div class="partido-controles">
    <div class="controles-izquierda">
      <button id="btn-iniciar-partido" class="btn btn-primary">Iniciar Partido</button>
      <button id="btn-pausar-partido" class="btn btn-warning" disabled>Pausar</button>
      <button id="btn-reanudar-partido" class="btn btn-success" disabled>Reanudar</button>
    </div>
    
    <div class="controles-centro">
      <span id="minuto-partido" class="minuto-display">0:00</span>
      <span id="marcador-partido" class="marcador-display">0 - 0</span>
    </div>
    
    <div class="controles-derecha">
      <label>Velocidad:</label>
      <button id="btn-velocidad-1x" class="btn btn-secondary active">1x</button>
      <button id="btn-velocidad-2x" class="btn btn-secondary">2x</button>
    </div>
  </div>
  
  <!-- LIENZO DE JUEGO -->
  <div class="canvas-container">
    <canvas id="campo-juego" width="1000" height="600"></canvas>
  </div>
  
  <!-- INFORMACIÓN DEL PARTIDO -->
  <div class="partido-info">
    <div class="info-card">
      <h4>Local: <span id="equipo-local-nombre">-</span></h4>
      <p>Goles: <span id="goles-local">0</span></p>
      <p>Posesión: <span id="posesion-local">0</span>%</p>
      <p>Tiros: <span id="tiros-local">0</span></p>
    </div>
    
    <div class="info-card">
      <h4>Visitante: <span id="equipo-visitante-nombre">-</span></h4>
      <p>Goles: <span id="goles-visitante">0</span></p>
      <p>Posesión: <span id="posesion-visitante">0</span>%</p>
      <p>Tiros: <span id="tiros-visitante">0</span></p>
    </div>
  </div>
  
  <!-- CONSOLA DE EVENTOS EN TIEMPO REAL -->
  <div class="partido-eventos">
    <h3>Eventos del Partido</h3>
    <div id="log-eventos" class="log-eventos-container"></div>
  </div>
</section>
