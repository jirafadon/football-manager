<!-- FRAGMENTO A AGREGAR AL index.html - REEMPLAZAR SECCIÓN DE PARTIDO RÁPIDO -->

<!-- SECCIÓN: PARTIDO INTERACTIVO EN CANVAS -->
<section id="seccion-partido-interactivo" class="partido-interactivo">
  <h2>Partido en Vivo</h2>

  <!-- CONTROLES DEL PARTIDO -->
  <div class="partido-controles-bar">
    <div class="controles-grupo-izquierda">
      <button id="btn-comenzar-partido" class="btn btn-primary">Comenzar Partido</button>
      <button id="btn-pausar-tactica" class="btn btn-warning" disabled>Pausar Táctica</button>
      <button id="btn-reanudar-partido" class="btn btn-success" disabled>Reanudar</button>
    </div>

    <div class="controles-grupo-centro">
      <div class="marcador-minuto">
        <span id="minuto-actual" class="minuto-texto">0:00</span>
        <span id="marcador-actual" class="marcador-texto">0 - 0</span>
      </div>
    </div>

    <div class="controles-grupo-derecha">
      <label>Velocidad:</label>
      <button id="btn-velocidad-1x" class="btn btn-velocidad active">1x</button>
      <button id="btn-velocidad-2x" class="btn btn-velocidad">2x</button>
    </div>
  </div>

  <!-- CANVAS DEL CAMPO -->
  <div class="canvas-wrapper">
    <canvas id="canvas-campo" width="1000" height="600"></canvas>
  </div>

  <!-- INFORMACIÓN DEL PARTIDO -->
  <div class="partido-info-grid">
    <div class="info-equipo">
      <h4 id="equipo-local-titulo">Local</h4>
      <p>Goles: <span id="goles-local-display">0</span></p>
      <p>Posesión: <span id="posesion-local-display">0</span>%</p>
      <p>Tiros: <span id="tiros-local-display">0</span></p>
    </div>

    <div class="info-equipo">
      <h4 id="equipo-visitante-titulo">Visitante</h4>
      <p>Goles: <span id="goles-visitante-display">0</span></p>
      <p>Posesión: <span id="posesion-visitante-display">0</span>%</p>
      <p>Tiros: <span id="tiros-visitante-display">0</span></p>
    </div>
  </div>

  <!-- CONSOLA DE RELATO -->
  <div class="relato-container">
    <h3>Relato del Partido</h3>
    <div id="log-relato" class="log-relato">
      <!-- Se llena dinámicamente con eventos -->
    </div>
  </div>
</section>

<style>
